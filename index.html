<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turmverteidigung – Reiche der Flammen</title>
<style>
  /* ========== GLOBALE STILE ========== */
  @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Almendra:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e8d5b0;
    font-family: 'Almendra', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ========== HAUPTLAYOUT ========== */
  #game-wrapper {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* ========== LINKE SEITENLEISTE (HUD) ========== */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: linear-gradient(180deg, #1a1420 0%, #12101a 100%);
    border-right: 2px solid #3a2a1a;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 10px;
    z-index: 10;
  }

  #sidebar h1 {
    font-family: 'MedievalSharp', cursive;
    font-size: 18px;
    color: #f0c040;
    text-align: center;
    text-shadow: 0 0 12px rgba(240,180,40,0.5);
    border-bottom: 1px solid #3a2a1a;
    padding-bottom: 8px;
  }

  .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    padding: 4px 6px;
    background: rgba(255,255,255,0.03);
    border-radius: 4px;
  }
  .hud-label { color: #9a8a6a; font-size: 13px; }
  .hud-value { color: #f0c040; font-weight: 700; font-size: 16px; }
  #lives-val { color: #e04040; }
  #wave-val { color: #80c0ff; }

  /* ========== TURM-AUSWAHL IN SIDEBAR ========== */
  #tower-panel {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #tower-panel h2 {
    font-family: 'MedievalSharp', cursive;
    font-size: 14px;
    color: #c0a060;
    text-align: center;
    margin-bottom: 2px;
  }

  .tower-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid #2a2230;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tower-btn:hover { background: rgba(240,180,40,0.1); border-color: #5a4a30; }
  .tower-btn.selected { background: rgba(240,180,40,0.18); border-color: #f0c040; box-shadow: 0 0 8px rgba(240,180,40,0.2); }
  .tower-btn img { width: 40px; height: 40px; image-rendering: pixelated; }
  .tower-btn .tb-info { display: flex; flex-direction: column; }
  .tower-btn .tb-name { font-size: 13px; color: #e8d5b0; font-weight: 700; }
  .tower-btn .tb-cost { font-size: 11px; color: #f0c040; }
  .tower-btn .tb-desc { font-size: 10px; color: #8a7a5a; line-height: 1.2; }

  /* ========== AKTIONEN ========== */
  #action-bar {
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid #3a2a1a;
    padding-top: 8px;
  }
  .action-btn {
    padding: 8px;
    font-family: 'MedievalSharp', cursive;
    font-size: 15px;
    border: 1px solid #3a2a1a;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  #btn-wave {
    background: linear-gradient(135deg, #2a4020, #1a3018);
    color: #80e060;
    border-color: #4a6030;
  }
  #btn-wave:hover { background: linear-gradient(135deg, #3a5028, #2a4020); box-shadow: 0 0 10px rgba(80,200,60,0.3); }
  #btn-wave.disabled { opacity: 0.4; cursor: default; pointer-events: none; }
  #btn-sell {
    background: linear-gradient(135deg, #402020, #301818);
    color: #e08080;
    border-color: #603030;
  }
  #btn-sell:hover { background: linear-gradient(135deg, #502828, #402020); }
  #btn-upgrade {
    background: linear-gradient(135deg, #2a2a40, #1a1a30);
    color: #a0a0f0;
    border-color: #404060;
  }
  #btn-upgrade:hover { background: linear-gradient(135deg, #3a3a50, #2a2a40); }

  /* ========== CANVAS-BEREICH ========== */
  #canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e0e14;
    position: relative;
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  /* ========== INFO-TOOLTIP ========== */
  #tooltip {
    position: absolute;
    background: rgba(15,12,20,0.95);
    border: 1px solid #4a3a2a;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    color: #d0c0a0;
    pointer-events: none;
    display: none;
    z-index: 100;
    max-width: 180px;
    line-height: 1.4;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }

  /* ========== GAME-OVER OVERLAY ========== */
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 200;
  }
  #overlay.show { display: flex; }
  #overlay h2 {
    font-family: 'MedievalSharp', cursive;
    font-size: 42px;
    color: #f0c040;
    text-shadow: 0 0 30px rgba(240,180,40,0.6);
    margin-bottom: 16px;
  }
  #overlay p { font-size: 18px; color: #b0a080; margin-bottom: 20px; }
  #overlay button {
    font-family: 'MedievalSharp', cursive;
    font-size: 20px;
    padding: 12px 36px;
    background: linear-gradient(135deg, #3a2a10, #2a1a08);
    color: #f0c040;
    border: 2px solid #6a5020;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #overlay button:hover { background: linear-gradient(135deg, #4a3a18, #3a2a10); box-shadow: 0 0 16px rgba(240,180,40,0.4); }

  /* Scrollbar */
  #tower-panel::-webkit-scrollbar { width: 4px; }
  #tower-panel::-webkit-scrollbar-thumb { background: #3a2a1a; border-radius: 2px; }
</style>
</head>
<body>

<div id="game-wrapper">
  <!-- Seitenleiste -->
  <div id="sidebar">
    <h1>⚔ Turmverteidigung</h1>

    <div class="hud-row"><span class="hud-label">Gold:</span><span class="hud-value" id="gold-val">200</span></div>
    <div class="hud-row"><span class="hud-label">Leben:</span><span class="hud-value" id="lives-val">20</span></div>
    <div class="hud-row"><span class="hud-label">Welle:</span><span class="hud-value" id="wave-val">0 / 20</span></div>
    <div class="hud-row"><span class="hud-label">Punkte:</span><span class="hud-value" id="score-val">0</span></div>

    <div id="tower-panel">
      <h2>🏰 Türme</h2>
      <!-- Wird per JS gefüllt -->
    </div>

    <div id="action-bar">
      <div class="action-btn" id="btn-wave">▶ Nächste Welle</div>
      <div class="action-btn" id="btn-upgrade" style="display:none;">⬆ Upgrade (–)</div>
      <div class="action-btn" id="btn-sell" style="display:none;">💰 Verkaufen (–)</div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-area">
    <canvas id="gameCanvas"></canvas>
    <div id="tooltip"></div>
    <div id="overlay">
      <h2 id="overlay-title">Spiel vorbei!</h2>
      <p id="overlay-text">Du hast 0 Punkte erreicht.</p>
      <button onclick="resetGame()">Nochmal spielen</button>
    </div>
  </div>
</div>

<script>
// =============================================================================
// TOWER DEFENSE – REICHE DER FLAMMEN
// =============================================================================

// ======================== KONSTANTEN & KONFIGURATION =========================
const TILE = 48;           // Kachelgröße in Pixel
const COLS = 18;           // Spielfeld-Spalten
const ROWS = 13;           // Spielfeld-Zeilen
const FPS_TARGET = 60;

// ======================== TURM-DEFINITIONEN ==================================
const TOWER_DEFS = [
  {
    id: 'arrow',    name: 'Pfeilturm',    img: 'Bogenschützen.png',
    cost: 50,       desc: 'Standard – schneller Angriff',
    damage: 12,     range: 3.2, fireRate: 0.6,  projSpeed: 6,
    projColor: '#e0c070', special: 'none',
    upgrades: [
      { cost: 40,  damage: 18, range: 3.5, fireRate: 0.5 },
      { cost: 80,  damage: 28, range: 4.0, fireRate: 0.4 },
    ]
  },
  {
    id: 'magic',    name: 'Magierturm',   img: 'Magieturm.png',
    cost: 80,       desc: 'Langsam, hoher Schaden',
    damage: 45,     range: 3.0, fireRate: 1.8,  projSpeed: 4,
    projColor: '#b060ff', special: 'none',
    upgrades: [
      { cost: 60,  damage: 65,  range: 3.3, fireRate: 1.5 },
      { cost: 120, damage: 100, range: 3.6, fireRate: 1.2 },
    ]
  },
  {
    id: 'earth',    name: 'Erdturm',      img: 'Zwergenturm.png',
    cost: 70,       desc: 'AoE – verlangsamt Gegner',
    damage: 10,     range: 2.5, fireRate: 1.4,  projSpeed: 4,
    projColor: '#80c040', special: 'slow', slowFactor: 0.4, slowDur: 2.0, aoE: 1.2,
    upgrades: [
      { cost: 50,  damage: 16, range: 2.8, slowFactor: 0.3, aoE: 1.5 },
      { cost: 100, damage: 25, range: 3.2, slowFactor: 0.2, aoE: 1.8 },
    ]
  },
  {
    id: 'ballista', name: 'Ballista',     img: 'Armbrust.png',
    cost: 90,       desc: 'Hohe Reichweite, Durchschlag',
    damage: 30,     range: 5.0, fireRate: 2.0,  projSpeed: 8,
    projColor: '#c0c0c0', special: 'pierce', pierceCount: 2,
    upgrades: [
      { cost: 70,  damage: 45, range: 5.5, pierceCount: 3 },
      { cost: 140, damage: 70, range: 6.0, pierceCount: 4 },
    ]
  },
  {
    id: 'alchemist', name: 'Alchemist',   img: 'Alchemist.png',
    cost: 75,        desc: 'Gift – Schaden über Zeit',
    damage: 8,       range: 2.8, fireRate: 1.0,  projSpeed: 4,
    projColor: '#40e080', special: 'poison', poisonDmg: 5, poisonDur: 3.0,
    upgrades: [
      { cost: 55,  damage: 12, poisonDmg: 8,  poisonDur: 4.0 },
      { cost: 110, damage: 18, poisonDmg: 14, poisonDur: 5.0 },
    ]
  },
  {
    id: 'dragon',   name: 'Drachenturm',  img: 'Dachenturm.png',
    cost: 150,      desc: 'Feuer-Atem – massiver AoE',
    damage: 20,     range: 2.2, fireRate: 0.8,  projSpeed: 5,
    projColor: '#ff6020', special: 'fire', aoE: 1.0, burnDmg: 4, burnDur: 2.0,
    upgrades: [
      { cost: 100, damage: 30, aoE: 1.3, burnDmg: 7,  burnDur: 2.5 },
      { cost: 200, damage: 50, aoE: 1.6, burnDmg: 12, burnDur: 3.0 },
    ]
  },
];

// ======================== WELLEN-DEFINITIONEN ================================
// Jede Welle: { count, hp, speed, reward, delay, types }
function generateWaves(totalWaves) {
  const waves = [];
  for (let i = 1; i <= totalWaves; i++) {
    const count = 6 + Math.floor(i * 1.5);
    const hp = 30 + i * 25 + Math.floor(i * i * 1.2);
    const speed = 1.0 + Math.min(i * 0.06, 1.2);
    const reward = 5 + Math.floor(i * 1.5);
    const delay = Math.max(0.35, 0.9 - i * 0.02); // Sekunden zwischen Gegnern
    // Ab Welle 5: schnelle Gegner, ab 10: Bosse
    const types = [];
    types.push({ hp, speed, reward, color: '#c04040', radius: 8 }); // Normal
    if (i >= 4) types.push({ hp: hp * 0.5, speed: speed * 1.6, reward: reward + 2, color: '#40a0e0', radius: 6 }); // Schnell
    if (i >= 7) types.push({ hp: hp * 0.7, speed: speed * 0.8, reward: reward + 3, color: '#a040c0', radius: 7 }); // Gepanzert (etwas langsamer, mittlere HP)
    if (i % 5 === 0) types.push({ hp: hp * 4, speed: speed * 0.5, reward: reward * 5, color: '#f0c020', radius: 14 }); // Boss
    waves.push({ count, delay, types });
  }
  return waves;
}

const TOTAL_WAVES = 20;
let WAVES = generateWaves(TOTAL_WAVES);

// ======================== PFAD-DEFINITION ====================================
// Wegpunkte in Kachel-Koordinaten (col, row). Gegner laufen durch diese Punkte.
const PATH_TILES = [
  [0, 3], [1,3], [2,3], [3,3], [4,3], [5,3], [6,3], [7,3],
  [7,4], [7,5], [7,6], [7,7],
  [8,7], [9,7], [10,7], [11,7],
  [11,6], [11,5], [11,4], [11,3], [11,2], [11,1],
  [12,1], [13,1], [14,1], [15,1],
  [15,2], [15,3], [15,4], [15,5], [15,6], [15,7], [15,8], [15,9],
  [14,9], [13,9], [12,9], [11,9], [10,9], [9,9], [8,9], [7,9],
  [7,10], [7,11],
  [8,11], [9,11], [10,11], [11,11], [12,11], [13,11], [14,11], [15,11], [16,11], [17,11]
];

// Pfad-Pixel-Positionen (Mittelpunkt jeder Kachel)
const PATH_PX = PATH_TILES.map(([c,r]) => ({ x: c * TILE + TILE/2, y: r * TILE + TILE/2 }));

// Set für schnelle Prüfung, ob eine Kachel zum Pfad gehört
const PATH_SET = new Set(PATH_TILES.map(([c,r]) => `${c},${r}`));

// ======================== SPIELZUSTAND =======================================
let gold = 200;
let lives = 20;
let score = 0;
let waveNum = 0;
let waveActive = false;
let spawnTimer = 0;
let spawnIndex = 0;
let currentWaveEnemies = [];
let gameOver = false;
let gameWon = false;

let towers = [];        // Platzierte Türme
let enemies = [];       // Aktive Gegner
let projectiles = [];   // Fliegende Projektile
let particles = [];     // Visuelle Partikel
let floatingTexts = []; // Schadenszahlen usw.

let selectedTowerDef = null;  // Ausgewählter Turmtyp zum Platzieren
let selectedTower = null;     // Ausgewählter platzierter Turm (zum Upgraden/Verkaufen)
let hoverTile = null;         // Kachel unter dem Mauszeiger

// ======================== BILD-VORVERARBEITUNG ================================
/** Entfernt weißen Hintergrund (RGB 255,255,255) und macht ihn transparent */
function preprocessImage(img) {
  const c = document.createElement('canvas');
  c.width = img.width;
  c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const imgData = ctx.getImageData(0, 0, c.width, c.height);
  const d = imgData.data;
  // Schwellenwert für "fast weiß"
  const threshold = 240;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i] >= threshold && d[i+1] >= threshold && d[i+2] >= threshold) {
      d[i+3] = 0; // Alpha auf 0 setzen
    }
  }
  ctx.putImageData(imgData, 0, 0);
  // Neues Bild aus Canvas erstellen
  const newImg = new Image();
  newImg.src = c.toDataURL();
  return newImg;
}

// Bilder laden
const towerImages = {};
let imagesLoaded = 0;
const totalImages = TOWER_DEFS.length;

function loadImages(callback) {
  TOWER_DEFS.forEach(def => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      towerImages[def.id] = preprocessImage(img);
      imagesLoaded++;
      // Sidebar-Buttons aktualisieren sobald Bild da ist
      updateSidebarImage(def.id);
      if (imagesLoaded >= totalImages) callback();
    };
    img.onerror = () => {
      // Fallback: farbiges Rechteck
      const c = document.createElement('canvas');
      c.width = 64; c.height = 64;
      const ctx = c.getContext('2d');
      ctx.fillStyle = def.projColor;
      ctx.fillRect(8,8,48,48);
      ctx.strokeStyle = '#fff';
      ctx.strokeRect(8,8,48,48);
      const fallback = new Image();
      fallback.src = c.toDataURL();
      towerImages[def.id] = fallback;
      imagesLoaded++;
      updateSidebarImage(def.id);
      if (imagesLoaded >= totalImages) callback();
    };
    img.src = def.img;
  });
}

// ======================== CANVAS SETUP =======================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

// ======================== KLASSE: GEGNER =====================================
class Enemy {
  constructor(hp, speed, reward, color, radius) {
    this.maxHp = hp;
    this.hp = hp;
    this.baseSpeed = speed;
    this.speed = speed;
    this.reward = reward;
    this.color = color;
    this.radius = radius;
    this.pathIndex = 0;     // Aktueller Wegpunkt-Index
    this.x = PATH_PX[0].x;
    this.y = PATH_PX[0].y;
    this.alive = true;
    this.reachedEnd = false;
    // Statuseffekte
    this.slowTimer = 0;
    this.slowFactor = 1;
    this.poisonTimer = 0;
    this.poisonDmg = 0;
    this.burnTimer = 0;
    this.burnDmg = 0;
  }

  update(dt) {
    if (!this.alive) return;

    // Statuseffekte abarbeiten
    if (this.slowTimer > 0) {
      this.slowTimer -= dt;
      this.speed = this.baseSpeed * this.slowFactor;
      if (this.slowTimer <= 0) this.speed = this.baseSpeed;
    }
    if (this.poisonTimer > 0) {
      this.poisonTimer -= dt;
      this.hp -= this.poisonDmg * dt;
      // Gift-Partikel
      if (Math.random() < 0.2) spawnParticle(this.x, this.y, '#40e080', 3, 0.5);
    }
    if (this.burnTimer > 0) {
      this.burnTimer -= dt;
      this.hp -= this.burnDmg * dt;
      if (Math.random() < 0.3) spawnParticle(this.x, this.y, '#ff6020', 4, 0.4);
    }

    if (this.hp <= 0) {
      this.alive = false;
      gold += this.reward;
      score += this.reward;
      spawnFloatingText(this.x, this.y - 10, `+${this.reward}`, '#f0c040');
      // Todespartikel
      for (let i = 0; i < 6; i++) spawnParticle(this.x, this.y, this.color, 5, 0.6);
      updateHUD();
      return;
    }

    // Pfad entlang bewegen
    if (this.pathIndex >= PATH_PX.length) {
      this.alive = false;
      this.reachedEnd = true;
      return;
    }

    const target = PATH_PX[this.pathIndex];
    const dx = target.x - this.x;
    const dy = target.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const moveSpeed = this.speed * TILE * dt;

    if (dist <= moveSpeed) {
      this.x = target.x;
      this.y = target.y;
      this.pathIndex++;
    } else {
      this.x += (dx / dist) * moveSpeed;
      this.y += (dy / dist) * moveSpeed;
    }
  }

  draw(ctx) {
    if (!this.alive) return;
    // Schatten
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(this.x, this.y + this.radius + 2, this.radius * 0.8, this.radius * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Körper
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Glanz
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(this.x - this.radius * 0.25, this.y - this.radius * 0.3, this.radius * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // HP-Balken
    const barW = this.radius * 2.5;
    const barH = 4;
    const barX = this.x - barW / 2;
    const barY = this.y - this.radius - 8;
    ctx.fillStyle = '#300000';
    ctx.fillRect(barX, barY, barW, barH);
    const hpRatio = Math.max(0, this.hp / this.maxHp);
    const hpColor = hpRatio > 0.5 ? '#40c040' : hpRatio > 0.25 ? '#e0c020' : '#e03030';
    ctx.fillStyle = hpColor;
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(barX, barY, barW, barH);
  }
}

// ======================== KLASSE: TURM =======================================
class Tower {
  constructor(col, row, def) {
    this.col = col;
    this.row = row;
    this.x = col * TILE + TILE / 2;
    this.y = row * TILE + TILE / 2;
    this.def = def;
    this.level = 0;      // 0 = Basis, 1, 2 = Upgrades
    this.fireTimer = 0;
    this.target = null;
    this.angle = 0;
    // Stats (kopiert, da sie sich durch Upgrades ändern)
    this.damage = def.damage;
    this.range = def.range;
    this.fireRate = def.fireRate;
    this.projSpeed = def.projSpeed;
    // Spezial-Werte
    this.slowFactor = def.slowFactor || 1;
    this.slowDur = def.slowDur || 0;
    this.aoE = def.aoE || 0;
    this.poisonDmg = def.poisonDmg || 0;
    this.poisonDur = def.poisonDur || 0;
    this.burnDmg = def.burnDmg || 0;
    this.burnDur = def.burnDur || 0;
    this.pierceCount = def.pierceCount || 0;
    this.totalInvested = def.cost;
  }

  upgrade() {
    if (this.level >= this.def.upgrades.length) return false;
    const upg = this.def.upgrades[this.level];
    if (gold < upg.cost) return false;
    gold -= upg.cost;
    this.totalInvested += upg.cost;
    this.level++;
    // Stats anwenden
    if (upg.damage)      this.damage = upg.damage;
    if (upg.range)       this.range = upg.range;
    if (upg.fireRate)    this.fireRate = upg.fireRate;
    if (upg.slowFactor !== undefined) this.slowFactor = upg.slowFactor;
    if (upg.aoE)         this.aoE = upg.aoE;
    if (upg.poisonDmg)   this.poisonDmg = upg.poisonDmg;
    if (upg.poisonDur)   this.poisonDur = upg.poisonDur;
    if (upg.burnDmg)     this.burnDmg = upg.burnDmg;
    if (upg.burnDur)     this.burnDur = upg.burnDur;
    if (upg.pierceCount) this.pierceCount = upg.pierceCount;
    updateHUD();
    return true;
  }

  getUpgradeCost() {
    if (this.level >= this.def.upgrades.length) return null;
    return this.def.upgrades[this.level].cost;
  }

  getSellValue() {
    return Math.floor(this.totalInvested * 0.6);
  }

  // Nächsten Gegner in Reichweite finden
  findTarget() {
    let best = null;
    let bestProgress = -1;
    const rangePx = this.range * TILE;
    for (const e of enemies) {
      if (!e.alive) continue;
      const dx = e.x - this.x;
      const dy = e.y - this.y;
      if (dx * dx + dy * dy <= rangePx * rangePx) {
        // Gegner der am weitesten auf dem Pfad ist bevorzugen
        if (e.pathIndex > bestProgress) {
          bestProgress = e.pathIndex;
          best = e;
        }
      }
    }
    return best;
  }

  update(dt) {
    this.fireTimer -= dt;
    this.target = this.findTarget();
    if (this.target) {
      this.angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
      if (this.fireTimer <= 0) {
        this.fire();
        this.fireTimer = this.fireRate;
      }
    }
  }

  fire() {
    const p = new Projectile(this.x, this.y, this.target, this);
    projectiles.push(p);
  }

  draw(ctx) {
    const img = towerImages[this.def.id];
    if (img && img.complete) {
      const size = TILE * 1.15;
      ctx.drawImage(img, this.x - size/2, this.y - size/2 - 4, size, size);
    } else {
      ctx.fillStyle = this.def.projColor;
      ctx.fillRect(this.col * TILE + 4, this.row * TILE + 4, TILE - 8, TILE - 8);
    }
    // Level-Sterne
    if (this.level > 0) {
      ctx.fillStyle = '#f0c040';
      ctx.font = '10px sans-serif';
      const stars = '★'.repeat(this.level);
      ctx.textAlign = 'center';
      ctx.fillText(stars, this.x, this.y + TILE/2 - 2);
    }
    // Reichweiten-Kreis wenn ausgewählt
    if (selectedTower === this) {
      ctx.strokeStyle = 'rgba(240,200,80,0.35)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.range * TILE, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(240,200,80,0.06)';
      ctx.fill();
    }
  }
}

// ======================== KLASSE: PROJEKTIL ==================================
class Projectile {
  constructor(x, y, target, tower) {
    this.x = x;
    this.y = y;
    this.target = target;
    this.tower = tower;
    this.speed = tower.projSpeed * TILE;
    this.alive = true;
    this.hitEnemies = new Set(); // Für Durchschlag
    this.color = tower.def.projColor;
    this.trail = [];
  }

  update(dt) {
    if (!this.alive) return;

    // Spur für Partikeleffekt
    this.trail.push({ x: this.x, y: this.y, life: 0.2 });
    if (this.trail.length > 6) this.trail.shift();

    // Wenn Ziel tot ist, weiterfliegen zum letzten Punkt
    let tx, ty;
    if (this.target && this.target.alive) {
      tx = this.target.x;
      ty = this.target.y;
    } else {
      // Kein gültiges Ziel mehr -> verschwinden
      this.alive = false;
      return;
    }

    const dx = tx - this.x;
    const dy = ty - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const move = this.speed * dt;

    if (dist <= move + this.target.radius) {
      this.hit(this.target);
    } else {
      this.x += (dx / dist) * move;
      this.y += (dy / dist) * move;
    }

    // Trail-Leben reduzieren
    for (const t of this.trail) t.life -= dt;
  }

  hit(enemy) {
    if (this.hitEnemies.has(enemy)) return;
    this.hitEnemies.add(enemy);

    const tw = this.tower;

    // AoE-Schaden (Erd- und Drachenturm)
    if (tw.aoE > 0) {
      const aoePx = tw.aoE * TILE;
      for (const e of enemies) {
        if (!e.alive) continue;
        const dx = e.x - this.x;
        const dy = e.y - this.y;
        if (dx * dx + dy * dy <= aoePx * aoePx) {
          e.hp -= tw.damage;
          // Slow-Effekt
          if (tw.def.special === 'slow' || tw.def.special === 'fire') {
            if (tw.def.special === 'slow') {
              e.slowTimer = tw.slowDur;
              e.slowFactor = tw.slowFactor;
            }
            if (tw.def.special === 'fire') {
              e.burnTimer = tw.burnDur;
              e.burnDmg = tw.burnDmg;
            }
          }
        }
      }
      // AoE-Visualisierung
      spawnAoECircle(this.x, this.y, aoePx, tw.def.projColor);
    } else {
      // Einzelziel-Schaden
      enemy.hp -= tw.damage;
    }

    // Gift
    if (tw.def.special === 'poison') {
      enemy.poisonTimer = tw.poisonDur;
      enemy.poisonDmg = tw.poisonDmg;
    }

    // Slow (Einzelziel, falls kein AoE)
    if (tw.def.special === 'slow' && tw.aoE === 0) {
      enemy.slowTimer = tw.slowDur;
      enemy.slowFactor = tw.slowFactor;
    }

    // Durchschlag – nächstes Ziel suchen
    if (tw.def.special === 'pierce' && this.hitEnemies.size < tw.pierceCount) {
      const rangePx = tw.range * TILE;
      let nextTarget = null;
      let bestDist = Infinity;
      for (const e of enemies) {
        if (!e.alive || this.hitEnemies.has(e)) continue;
        const dx = e.x - this.x;
        const dy = e.y - this.y;
        const d = dx*dx + dy*dy;
        if (d < bestDist && d < rangePx * rangePx) {
          bestDist = d;
          nextTarget = e;
        }
      }
      if (nextTarget) {
        this.target = nextTarget;
        return; // Weiter fliegen
      }
    }

    this.alive = false;
  }

  draw(ctx) {
    if (!this.alive) return;
    // Spur
    for (const t of this.trail) {
      if (t.life > 0) {
        ctx.globalAlpha = t.life * 3;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    // Projektil
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ======================== PARTIKEL & EFFEKTE =================================
function spawnParticle(x, y, color, size, life) {
  particles.push({
    x, y,
    vx: (Math.random() - 0.5) * 60,
    vy: (Math.random() - 0.5) * 60 - 20,
    color, size, life, maxLife: life
  });
}

function spawnAoECircle(x, y, radius, color) {
  particles.push({
    x, y, vx: 0, vy: 0,
    color, size: radius, life: 0.3, maxLife: 0.3,
    isAoE: true
  });
}

function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1.0 });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const f = floatingTexts[i];
    f.life -= dt;
    f.y -= 30 * dt;
    if (f.life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawParticles(ctx) {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    if (p.isAoE) {
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = alpha * 0.5;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1 - alpha * 0.5), 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = alpha * 0.1;
      ctx.fillStyle = p.color;
      ctx.fill();
    } else {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Schwebende Texte
  for (const f of floatingTexts) {
    ctx.globalAlpha = Math.min(1, f.life * 2);
    ctx.fillStyle = f.color;
    ctx.font = 'bold 13px Almendra, serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ======================== ZEICHNE SPIELFELD ==================================
function drawGrid(ctx) {
  // Hintergrund
  ctx.fillStyle = '#1a2a10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Gras-Textur (subtiles Muster)
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      const x = c * TILE;
      const y = r * TILE;
      // Leichte Farbvariation
      const shade = ((c + r) % 2 === 0) ? '#1e2e12' : '#1a2a10';
      ctx.fillStyle = shade;
      ctx.fillRect(x, y, TILE, TILE);
    }
  }

  // Pfad zeichnen
  ctx.fillStyle = '#3a3020';
  for (const [c, r] of PATH_TILES) {
    ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
  }
  // Pfad-Details (Ränder)
  ctx.strokeStyle = '#2a2018';
  ctx.lineWidth = 1;
  for (const [c, r] of PATH_TILES) {
    ctx.strokeRect(c * TILE + 0.5, r * TILE + 0.5, TILE - 1, TILE - 1);
  }

  // Start- und Ziel-Markierung
  const start = PATH_TILES[0];
  const end = PATH_TILES[PATH_TILES.length - 1];
  ctx.fillStyle = 'rgba(80,200,80,0.25)';
  ctx.fillRect(start[0] * TILE, start[1] * TILE, TILE, TILE);
  ctx.fillStyle = 'rgba(200,40,40,0.25)';
  ctx.fillRect(end[0] * TILE, end[1] * TILE, TILE, TILE);

  // Grid-Linien (sehr dezent)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * TILE, 0); ctx.lineTo(c * TILE, canvas.height); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * TILE); ctx.lineTo(canvas.width, r * TILE); ctx.stroke();
  }

  // Hover-Kachel hervorheben
  if (hoverTile && selectedTowerDef) {
    const [hc, hr] = hoverTile;
    const canPlace = canPlaceTower(hc, hr);
    ctx.fillStyle = canPlace ? 'rgba(80,200,80,0.2)' : 'rgba(200,40,40,0.2)';
    ctx.fillRect(hc * TILE, hr * TILE, TILE, TILE);
    ctx.strokeStyle = canPlace ? 'rgba(80,200,80,0.5)' : 'rgba(200,40,40,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(hc * TILE + 1, hr * TILE + 1, TILE - 2, TILE - 2);

    // Reichweiten-Vorschau
    if (canPlace) {
      ctx.strokeStyle = 'rgba(240,200,80,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(hc * TILE + TILE/2, hr * TILE + TILE/2, selectedTowerDef.range * TILE, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

// ======================== SPIELLOGIK =========================================
function canPlaceTower(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
  if (PATH_SET.has(`${col},${row}`)) return false;
  for (const t of towers) {
    if (t.col === col && t.row === row) return false;
  }
  return true;
}

function placeTower(col, row, def) {
  if (!canPlaceTower(col, row)) return false;
  if (gold < def.cost) return false;
  gold -= def.cost;
  const t = new Tower(col, row, def);
  towers.push(t);
  updateHUD();
  return true;
}

function sellTower(tower) {
  const value = tower.getSellValue();
  gold += value;
  const idx = towers.indexOf(tower);
  if (idx >= 0) towers.splice(idx, 1);
  spawnFloatingText(tower.x, tower.y - 10, `+${value}`, '#f0c040');
  selectedTower = null;
  updateSelectionUI();
  updateHUD();
}

function startWave() {
  if (waveActive || gameOver || waveNum >= TOTAL_WAVES) return;
  waveNum++;
  waveActive = true;
  const waveDef = WAVES[waveNum - 1];
  currentWaveEnemies = [];
  for (let i = 0; i < waveDef.count; i++) {
    const typeDef = waveDef.types[Math.floor(Math.random() * waveDef.types.length)];
    currentWaveEnemies.push(typeDef);
  }
  spawnIndex = 0;
  spawnTimer = 0;
  updateHUD();
  document.getElementById('btn-wave').classList.add('disabled');
}

function spawnNextEnemy(dt) {
  if (!waveActive || spawnIndex >= currentWaveEnemies.length) return;
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    const def = currentWaveEnemies[spawnIndex];
    enemies.push(new Enemy(def.hp, def.speed, def.reward, def.color, def.radius));
    spawnIndex++;
    spawnTimer = WAVES[waveNum - 1].delay;
  }
}

function checkWaveComplete() {
  if (!waveActive) return;
  if (spawnIndex >= currentWaveEnemies.length && enemies.every(e => !e.alive)) {
    waveActive = false;
    // Bonus-Gold nach Welle
    const bonus = 10 + waveNum * 5;
    gold += bonus;
    spawnFloatingText(canvas.width / 2, canvas.height / 2 - 40, `Welle ${waveNum} geschafft! +${bonus} Gold`, '#80c0ff');
    updateHUD();
    document.getElementById('btn-wave').classList.remove('disabled');

    if (waveNum >= TOTAL_WAVES) {
      gameWon = true;
      gameOver = true;
      showOverlay('Sieg!', `Du hast alle ${TOTAL_WAVES} Wellen überlebt!\nPunkte: ${score}`);
    }
  }
}

function checkLives() {
  // Gegner die das Ziel erreicht haben
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive && e.reachedEnd) {
      lives--;
      enemies.splice(i, 1);
      updateHUD();
      if (lives <= 0) {
        gameOver = true;
        showOverlay('Niederlage!', `Deine Verteidigung wurde bei Welle ${waveNum} durchbrochen.\nPunkte: ${score}`);
      }
    } else if (!e.alive) {
      enemies.splice(i, 1);
    }
  }
}

// ======================== HAUPT-GAME-LOOP ====================================
let lastTime = 0;

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // Max 50ms delta
  lastTime = timestamp;

  if (!gameOver) {
    // Spawnen
    spawnNextEnemy(dt);

    // Türme aktualisieren
    for (const t of towers) t.update(dt);

    // Gegner aktualisieren
    for (const e of enemies) e.update(dt);

    // Projektile aktualisieren
    for (let i = projectiles.length - 1; i >= 0; i--) {
      projectiles[i].update(dt);
      if (!projectiles[i].alive) projectiles.splice(i, 1);
    }

    // Partikel
    updateParticles(dt);

    // Tote Gegner entfernen / Leben prüfen
    checkLives();
    checkWaveComplete();
  }

  // ========== ZEICHNEN ==========
  drawGrid(ctx);

  // Türme zeichnen
  for (const t of towers) t.draw(ctx);

  // Gegner zeichnen
  for (const e of enemies) e.draw(ctx);

  // Projektile zeichnen
  for (const p of projectiles) p.draw(ctx);

  // Partikel & Texte
  drawParticles(ctx);

  requestAnimationFrame(gameLoop);
}

// ======================== UI-MANAGEMENT ======================================
function updateHUD() {
  document.getElementById('gold-val').textContent = gold;
  document.getElementById('lives-val').textContent = lives;
  document.getElementById('wave-val').textContent = `${waveNum} / ${TOTAL_WAVES}`;
  document.getElementById('score-val').textContent = score;
  // Tower-Buttons aktualisieren (Kosten-Anzeige)
  document.querySelectorAll('.tower-btn').forEach(btn => {
    const def = TOWER_DEFS.find(d => d.id === btn.dataset.towerId);
    if (def) {
      btn.style.opacity = gold >= def.cost ? '1' : '0.5';
    }
  });
}

function updateSelectionUI() {
  const btnUpgrade = document.getElementById('btn-upgrade');
  const btnSell = document.getElementById('btn-sell');
  if (selectedTower) {
    const upCost = selectedTower.getUpgradeCost();
    btnSell.style.display = 'block';
    btnSell.textContent = `💰 Verkaufen (+${selectedTower.getSellValue()})`;
    if (upCost !== null) {
      btnUpgrade.style.display = 'block';
      btnUpgrade.textContent = `⬆ Upgrade (${upCost} Gold)`;
      btnUpgrade.style.opacity = gold >= upCost ? '1' : '0.5';
    } else {
      btnUpgrade.style.display = 'block';
      btnUpgrade.textContent = '⬆ Max Level!';
      btnUpgrade.style.opacity = '0.4';
    }
  } else {
    btnUpgrade.style.display = 'none';
    btnSell.style.display = 'none';
  }
}

function buildSidebar() {
  const panel = document.getElementById('tower-panel');
  TOWER_DEFS.forEach(def => {
    const btn = document.createElement('div');
    btn.className = 'tower-btn';
    btn.dataset.towerId = def.id;
    btn.innerHTML = `
      <img id="sidebar-img-${def.id}" src="" alt="${def.name}">
      <div class="tb-info">
        <span class="tb-name">${def.name}</span>
        <span class="tb-cost">${def.cost} Gold</span>
        <span class="tb-desc">${def.desc}</span>
      </div>
    `;
    btn.addEventListener('click', () => {
      if (selectedTowerDef === def) {
        selectedTowerDef = null;
        btn.classList.remove('selected');
      } else {
        selectedTowerDef = def;
        selectedTower = null;
        updateSelectionUI();
        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      }
    });
    panel.appendChild(btn);
  });
}

function updateSidebarImage(towerID) {
  const img = document.getElementById(`sidebar-img-${towerID}`);
  if (img && towerImages[towerID]) {
    img.src = towerImages[towerID].src;
  }
}

function showOverlay(title, text) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-text').textContent = text;
  document.getElementById('overlay').classList.add('show');
}

function resetGame() {
  gold = 200; lives = 20; score = 0; waveNum = 0;
  waveActive = false; gameOver = false; gameWon = false;
  towers = []; enemies = []; projectiles = []; particles = []; floatingTexts = [];
  currentWaveEnemies = []; spawnIndex = 0; spawnTimer = 0;
  selectedTower = null; selectedTowerDef = null;
  WAVES = generateWaves(TOTAL_WAVES);
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('btn-wave').classList.remove('disabled');
  document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
  updateHUD();
  updateSelectionUI();
}

// ======================== EINGABE-HANDLING ====================================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const col = Math.floor(mx / TILE);
  const row = Math.floor(my / TILE);
  hoverTile = [col, row];
});

canvas.addEventListener('mouseleave', () => { hoverTile = null; });

canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const col = Math.floor(mx / TILE);
  const row = Math.floor(my / TILE);

  // Turm platzieren
  if (selectedTowerDef) {
    if (placeTower(col, row, selectedTowerDef)) {
      // Turm platziert – Auswahl beibehalten für Mehrfachplatzierung
      return;
    }
  }

  // Bestehenden Turm anklicken
  const clickedTower = towers.find(t => t.col === col && t.row === row);
  if (clickedTower) {
    selectedTower = clickedTower;
    selectedTowerDef = null;
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
    updateSelectionUI();
  } else {
    selectedTower = null;
    updateSelectionUI();
  }
});

// Rechtsklick zum Abbrechen
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  selectedTowerDef = null;
  selectedTower = null;
  document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
  updateSelectionUI();
});

// Wellen-Button
document.getElementById('btn-wave').addEventListener('click', startWave);

// Upgrade-Button
document.getElementById('btn-upgrade').addEventListener('click', () => {
  if (selectedTower) {
    selectedTower.upgrade();
    updateSelectionUI();
  }
});

// Verkaufen-Button
document.getElementById('btn-sell').addEventListener('click', () => {
  if (selectedTower) sellTower(selectedTower);
});

// Tastatur-Shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    selectedTowerDef = null;
    selectedTower = null;
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
    updateSelectionUI();
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    startWave();
  }
  // Zifferntasten 1-6 für Turm-Auswahl
  const num = parseInt(e.key);
  if (num >= 1 && num <= 6) {
    const def = TOWER_DEFS[num - 1];
    selectedTowerDef = def;
    selectedTower = null;
    updateSelectionUI();
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector(`[data-tower-id="${def.id}"]`)?.classList.add('selected');
  }
});

buildSidebar();
updateHUD();

loadImages(() => {
  console.log('Alle Turm-Bilder geladen und vorverarbeitet.');
  requestAnimationFrame(gameLoop);
});

// Falls Bilder schnell laden, Loop trotzdem starten
