<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turmverteidigung – Reiche der Flammen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Almendra:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f; color: #e8d5b0;
    font-family: 'Almendra', serif;
    overflow: hidden; height: 100vh; width: 100vw; user-select: none;
  }
  #game-wrapper { display: flex; height: 100vh; width: 100vw; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: 230px; min-width: 230px;
    background: linear-gradient(180deg, #1a1420 0%, #12101a 100%);
    border-right: 2px solid #3a2a1a;
    display: flex; flex-direction: column; padding: 10px; gap: 8px; z-index: 10;
    overflow-y: auto;
  }
  #sidebar h1 {
    font-family: 'MedievalSharp', cursive; font-size: 17px; color: #f0c040;
    text-align: center; text-shadow: 0 0 12px rgba(240,180,40,0.5);
    border-bottom: 1px solid #3a2a1a; padding-bottom: 6px;
  }
  .hud-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; padding: 3px 6px; background: rgba(255,255,255,0.03); border-radius: 4px;
  }
  .hud-label { color: #9a8a6a; font-size: 12px; }
  .hud-value { color: #f0c040; font-weight: 700; font-size: 15px; }
  #lives-val { color: #e04040; }
  #wave-val { color: #80c0ff; }

  /* Geschwindigkeitsregler */
  #speed-row { display: flex; gap: 4px; justify-content: center; padding: 2px 0; }
  .speed-btn {
    padding: 3px 10px; font-family: 'MedievalSharp', cursive; font-size: 13px;
    border: 1px solid #3a2a1a; border-radius: 4px; cursor: pointer;
    background: rgba(255,255,255,0.04); color: #9a8a6a; transition: all 0.15s;

  /* Turm-Panel */
  #tower-panel { flex: 1; display: flex; flex-direction: column; gap: 5px; min-height: 0; overflow-y: auto; }

  /* Aktionen */
  #action-bar { display: flex; flex-direction: column; gap: 5px; border-top: 1px solid #3a2a1a; padding-top: 6px; }
  .action-btn {

    border: 1px solid #3a2a1a; border-radius: 6px; cursor: pointer; text-align: center; transition: all 0.15s;
  }
  #btn-wave { background: linear-gradient(135deg, #2a4020, #1a3018); color: #80e060; border-color: #4a6030; }

  #btn-upgrade:hover { background: linear-gradient(135deg, #3a3a50, #2a2a40); }

  /* Turm-Info-Panel */
  #tower-info {
    display: none; background: rgba(255,255,255,0.03); border: 1px solid #2a2230;
    border-radius: 6px; padding: 6px 8px; font-size: 11px; line-height: 1.5;
  }
  #tower-info .ti-title { font-size: 13px; font-weight: 700; color: #f0c040; margin-bottom: 2px; }
  #tower-info .ti-stat { color: #b0a080; }
  #tower-info .ti-stat span { color: #e8d5b0; }
  #tower-info .ti-upgrade { color: #80a0e0; font-size: 10px; margin-top: 3px; border-top: 1px solid #2a2230; padding-top: 3px; }
  #tower-info .ti-upgrade span { color: #a0c0ff; }

  /* Wellen-Vorschau */
  #wave-preview {
    display: none; background: rgba(255,255,255,0.03); border: 1px solid #2a2230;
    border-radius: 6px; padding: 6px 8px; font-size: 11px; line-height: 1.4;
  }
  #wave-preview .wp-title { font-size: 12px; font-weight: 700; color: #80c0ff; margin-bottom: 3px; }
  #wave-preview .wp-line { color: #b0a080; }

  /* Canvas */
  #canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #0e0e14; position: relative; overflow: hidden; }
  canvas { display: block; cursor: crosshair; }

  /* Overlay */
  #overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.82);
    display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 200;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-family: 'MedievalSharp', cursive; font-size: 40px; color: #f0c040; text-shadow: 0 0 30px rgba(240,180,40,0.6); margin-bottom: 12px; }
  #overlay p { font-size: 17px; color: #b0a080; margin-bottom: 18px; white-space: pre-line; text-align: center; }
  #overlay button {
    font-family: 'MedievalSharp', cursive; font-size: 19px; padding: 10px 32px;
    background: linear-gradient(135deg, #3a2a10, #2a1a08); color: #f0c040;
    border: 2px solid #6a5020; border-radius: 8px; cursor: pointer; transition: all 0.2s;
  }
  #overlay button:hover { background: linear-gradient(135deg, #4a3a18, #3a2a10); box-shadow: 0 0 16px rgba(240,180,40,0.4); }

  /* Scrollbar */
  #sidebar::-webkit-scrollbar, #tower-panel::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb, #tower-panel::-webkit-scrollbar-thumb { background: #3a2a1a; border-radius: 2px; }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="sidebar">
    <h1>⚔ Turmverteidigung</h1>
    <div class="hud-row"><span class="hud-label">Gold:</span><span class="hud-value" id="gold-val">200</span></div>
    <div class="hud-row"><span class="hud-label">Leben:</span><span class="hud-value" id="lives-val">20</span></div>

      <button onclick="resetGame()">Nochmal spielen</button>
    </div>

</div>

<script>
// =============================================================================
// TOWER DEFENSE – REICHE DER FLAMMEN v2
// =============================================================================

const TILE = 48;
const COLS = 18;
const ROWS = 13;
const TOTAL_WAVES = 20;
let gameSpeed = 1;

// ======================== SCREEN-SHAKE =======================================
let shakeAmount = 0;
const shakeDecay = 0.9;
function triggerShake(intensity) { shakeAmount = Math.max(shakeAmount, intensity); }

// ======================== SOUND-ENGINE (Web Audio API) ========================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    switch(type) {
      case 'place':
        osc.type='triangle'; osc.frequency.setValueAtTime(300,now);
        osc.frequency.exponentialRampToValueAtTime(600,now+0.08);
        gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);
        osc.start(now); osc.stop(now+0.15); break;
      case 'shoot':
        osc.type='sawtooth'; osc.frequency.setValueAtTime(800,now);
        osc.frequency.exponentialRampToValueAtTime(200,now+0.06);
        gain.gain.setValueAtTime(0.04,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.06);
        osc.start(now); osc.stop(now+0.06); break;
      case 'hit':
        osc.type='square'; osc.frequency.setValueAtTime(150,now);
        osc.frequency.exponentialRampToValueAtTime(80,now+0.08);
        gain.gain.setValueAtTime(0.06,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.1);
        osc.start(now); osc.stop(now+0.1); break;
      case 'kill':
        osc.type='triangle'; osc.frequency.setValueAtTime(500,now);
        osc.frequency.exponentialRampToValueAtTime(900,now+0.1);
        gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.2);
        osc.start(now); osc.stop(now+0.2); break;
      case 'wave':
        osc.type='sine'; osc.frequency.setValueAtTime(220,now);
        osc.frequency.exponentialRampToValueAtTime(440,now+0.15);
        osc.frequency.exponentialRampToValueAtTime(660,now+0.3);
        gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.4);
        osc.start(now); osc.stop(now+0.4); break;
      case 'waveclear':
        osc.type='sine'; osc.frequency.setValueAtTime(440,now);
        osc.frequency.setValueAtTime(550,now+0.1);
        osc.frequency.setValueAtTime(660,now+0.2);
        osc.frequency.setValueAtTime(880,now+0.3);
        gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.5);
        osc.start(now); osc.stop(now+0.5); break;
      case 'leak':
        osc.type='sawtooth'; osc.frequency.setValueAtTime(200,now);
        osc.frequency.exponentialRampToValueAtTime(60,now+0.3);
        gain.gain.setValueAtTime(0.15,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.35);
        osc.start(now); osc.stop(now+0.35); triggerShake(6); break;
      case 'sell':
        osc.type='sine'; osc.frequency.setValueAtTime(600,now);
        osc.frequency.exponentialRampToValueAtTime(300,now+0.12);
        gain.gain.setValueAtTime(0.08,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);
        osc.start(now); osc.stop(now+0.15); break;
      case 'upgrade':
        osc.type='sine'; osc.frequency.setValueAtTime(400,now);
        osc.frequency.exponentialRampToValueAtTime(800,now+0.1);
        osc.frequency.exponentialRampToValueAtTime(1000,now+0.2);
        gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.3);
        osc.start(now); osc.stop(now+0.3); break;
    }
  } catch(e) {}
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  try {
    const bs = audioCtx.sampleRate * dur;
    const buf = audioCtx.createBuffer(1, bs, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bs; i++) d[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    src.connect(g); g.connect(audioCtx.destination);
    src.start(); src.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

// ======================== TURM-DEFINITIONEN ==================================
const TOWER_DEFS = [
  { id:'arrow', name:'Pfeilturm', img:'Bogenschützen.png', cost:50, desc:'Standard – schnell',
    damage:12, range:3.2, fireRate:0.6, projSpeed:6, projColor:'#e0c070', special:'none',
    upgrades:[ {cost:40,damage:18,range:3.5,fireRate:0.5}, {cost:80,damage:28,range:4.0,fireRate:0.4} ]
  },
  { id:'magic', name:'Magierturm', img:'Magieturm.png', cost:80, desc:'Langsam, hoher Schaden',
    damage:45, range:3.0, fireRate:1.8, projSpeed:4, projColor:'#b060ff', special:'none',
    upgrades:[ {cost:60,damage:65,range:3.3,fireRate:1.5}, {cost:120,damage:100,range:3.6,fireRate:1.2} ]
  },
  { id:'earth', name:'Erdturm', img:'Zwergenturm.png', cost:70, desc:'AoE + Slow',
    damage:10, range:2.5, fireRate:1.4, projSpeed:4, projColor:'#80c040', special:'slow',
    slowFactor:0.4, slowDur:2.0, aoE:1.2,
    upgrades:[ {cost:50,damage:16,range:2.8,slowFactor:0.3,aoE:1.5}, {cost:100,damage:25,range:3.2,slowFactor:0.2,aoE:1.8} ]
  },
  { id:'ballista', name:'Ballista', img:'Armbrust.png', cost:90, desc:'Hohe Reichweite, Durchschlag',
    damage:30, range:5.0, fireRate:2.0, projSpeed:8, projColor:'#c0c0c0', special:'pierce', pierceCount:2,
    upgrades:[ {cost:70,damage:45,range:5.5,pierceCount:3}, {cost:140,damage:70,range:6.0,pierceCount:4} ]
  },
  { id:'alchemist', name:'Alchemist', img:'Alchemist.png', cost:75, desc:'Gift – DoT',
    damage:8, range:2.8, fireRate:1.0, projSpeed:4, projColor:'#40e080', special:'poison',
    poisonDmg:5, poisonDur:3.0,
    upgrades:[ {cost:55,damage:12,poisonDmg:8,poisonDur:4.0}, {cost:110,damage:18,poisonDmg:14,poisonDur:5.0} ]
  },
  { id:'dragon', name:'Drachenturm', img:'Dachenturm.png', cost:150, desc:'Feuer-AoE + Brennen',
    damage:20, range:2.2, fireRate:0.8, projSpeed:5, projColor:'#ff6020', special:'fire',
    aoE:1.0, burnDmg:4, burnDur:2.0,
    upgrades:[ {cost:100,damage:30,aoE:1.3,burnDmg:7,burnDur:2.5}, {cost:200,damage:50,aoE:1.6,burnDmg:12,burnDur:3.0} ]
  },
];

// ======================== GEGNER-TYPEN (Papierflieger-Varianten) ==============
const ENEMY_TYPES = {
  normal:  { hue:0,   scale:1.0, label:'Normal',    color:'#c04040' },
  fast:    { hue:180, scale:0.72, label:'Schnell',   color:'#40a0e0' },
  armored: { hue:270, scale:1.1, label:'Gepanzert', color:'#a040c0' },
  boss:    { hue:50,  scale:1.6, label:'Boss',      color:'#f0c020' },
};

// ======================== WELLEN =============================================
function generateWaves(n) {
  const w = [];
  for (let i=1; i<=n; i++) {
    const count = 6 + Math.floor(i*1.5);
    const hp = 30 + i*25 + Math.floor(i*i*1.2);
    const speed = 1.0 + Math.min(i*0.06, 1.2);
    const reward = 5 + Math.floor(i*1.5);
    const delay = Math.max(0.35, 0.9 - i*0.02);
    const types = [];
    types.push({hp, speed, reward, type:'normal'});
    if (i>=4)  types.push({hp:hp*0.5, speed:speed*1.6, reward:reward+2, type:'fast'});
    if (i>=7)  types.push({hp:hp*0.7, speed:speed*0.8, reward:reward+3, type:'armored'});
    if (i%5===0) types.push({hp:hp*4, speed:speed*0.5, reward:reward*5, type:'boss'});
    w.push({count, delay, types});
  }
  return w;
}
let WAVES = generateWaves(TOTAL_WAVES);

// ======================== PFAD ===============================================
const PATH_TILES = [
  [0,3],[1,3],[2,3],[3,3],[4,3],[5,3],[6,3],[7,3],
  [7,4],[7,5],[7,6],[7,7],
  [8,7],[9,7],[10,7],[11,7],
  [11,6],[11,5],[11,4],[11,3],[11,2],[11,1],
  [12,1],[13,1],[14,1],[15,1],
  [15,2],[15,3],[15,4],[15,5],[15,6],[15,7],[15,8],[15,9],
  [14,9],[13,9],[12,9],[11,9],[10,9],[9,9],[8,9],[7,9],
  [7,10],[7,11],
  [8,11],[9,11],[10,11],[11,11],[12,11],[13,11],[14,11],[15,11],[16,11],[17,11]
];
const PATH_PX = PATH_TILES.map(([c,r])=>({x:c*TILE+TILE/2, y:r*TILE+TILE/2}));
const PATH_SET = new Set(PATH_TILES.map(([c,r])=>`${c},${r}`));

// ======================== SPIELZUSTAND =======================================
let gold=200, lives=20, score=0, waveNum=0;
let waveActive=false, spawnTimer=0, spawnIndex=0, currentWaveEnemies=[];
let gameOver=false, gameWon=false;
let towers=[], enemies=[], projectiles=[], particles=[], floatingTexts=[];
let selectedTowerDef=null, selectedTower=null, hoverTile=null;

// ======================== BILD-VERARBEITUNG ==================================
function preprocessImage(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth || img.width;
  c.height = img.naturalHeight || img.height;
  if (c.width === 0 || c.height === 0) return img;
  const cx = c.getContext('2d');
  cx.drawImage(img, 0, 0);
  const id = cx.getImageData(0, 0, c.width, c.height);
  const d = id.data;
  const thr = 235;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i]>=thr && d[i+1]>=thr && d[i+2]>=thr) d[i+3] = 0;
  }
  cx.putImageData(id, 0, 0);
  const out = new Image();
  out.src = c.toDataURL();
  return out;
}

function tintImage(baseImg, hueRotate) {
  if (hueRotate === 0) return baseImg;
  const c = document.createElement('canvas');
  const w = baseImg.naturalWidth || baseImg.width || 128;
  const h = baseImg.naturalHeight || baseImg.height || 128;
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  cx.filter = `hue-rotate(${hueRotate}deg) saturate(1.3)`;
  cx.drawImage(baseImg, 0, 0, w, h);
  cx.filter = 'none';
  const out = new Image();
  out.src = c.toDataURL();
  return out;
}

const towerImages = {};
const enemyImages = {};
let enemyBaseImg = null;

function loadImages(callback) {
  let loaded = 0;
  const total = TOWER_DEFS.length + 1;
  const check = () => { loaded++; if (loaded >= total) callback(); };

  TOWER_DEFS.forEach(def => {
    const img = new Image();
    img.onload = () => {
      towerImages[def.id] = preprocessImage(img);
      updateSidebarImage(def.id);
      check();
    };
    img.onerror = () => {
      // Fallback-Bild
      const c = document.createElement('canvas'); c.width=64; c.height=64;
      const cx = c.getContext('2d');
      cx.fillStyle = def.projColor; cx.fillRect(8,8,48,48);
      const fb = new Image(); fb.src = c.toDataURL();
      towerImages[def.id] = fb; updateSidebarImage(def.id); check();
    };
    img.src = def.img;
  });

  // Papierflieger-Gegner
  const eImg = new Image();
  eImg.onload = () => {
    const processed = preprocessImage(eImg);
    // Warten bis das preprocessed Bild fertig ist
    const createVariants = (base) => {
      enemyBaseImg = base;
      for (const [key, et] of Object.entries(ENEMY_TYPES)) {
        enemyImages[key] = tintImage(base, et.hue);
      }
      check();
    };
    if (processed.complete && processed.naturalWidth > 0) {
      createVariants(processed);
    } else {
      processed.onload = () => createVariants(processed);
    }
  };
  eImg.onerror = () => check();
  eImg.src = '1774733849233.png';
}

// ======================== CANVAS =============================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

// ======================== KLASSE: ENEMY ======================================
class Enemy {
  constructor(hp, speed, reward, type) {
    this.maxHp = hp; this.hp = hp;
    this.baseSpeed = speed; this.speed = speed;
    this.reward = reward; this.type = type;
    this.et = ENEMY_TYPES[type];
    this.pathIndex = 0;
    this.x = PATH_PX[0].x; this.y = PATH_PX[0].y;
    this.angle = 0;
    this.alive = true; this.reachedEnd = false;
    this.slowTimer=0; this.slowFactor=1;
    this.poisonTimer=0; this.poisonDmg=0;
    this.burnTimer=0; this.burnDmg=0;
  }

  update(dt) {
    if (!this.alive) return;
    if (this.slowTimer > 0) {
      this.slowTimer -= dt;
      this.speed = this.baseSpeed * this.slowFactor;
      if (this.slowTimer <= 0) this.speed = this.baseSpeed;
    }
    if (this.poisonTimer > 0) {
      this.poisonTimer -= dt; this.hp -= this.poisonDmg * dt;
      if (Math.random()<0.15) spawnParticle(this.x, this.y, '#40e080', 3, 0.5);
    }
    if (this.burnTimer > 0) {
      this.burnTimer -= dt; this.hp -= this.burnDmg * dt;
      if (Math.random()<0.25) spawnParticle(this.x, this.y, '#ff6020', 4, 0.4);
    }
    if (this.hp <= 0) {
      this.alive = false;
      gold += this.reward; score += this.reward;
      spawnFloatingText(this.x, this.y-10, `+${this.reward}`, '#f0c040');
      for (let i=0;i<6;i++) spawnParticle(this.x, this.y, this.et.color, 5, 0.6);
      playSound('kill');
      if (this.type==='boss') { triggerShake(10); playNoise(0.3, 0.12); }
      updateHUD(); return;
    }
    if (this.pathIndex >= PATH_PX.length) {
      this.alive = false; this.reachedEnd = true; return;
    }
    const t = PATH_PX[this.pathIndex];
    const dx = t.x-this.x, dy = t.y-this.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const ms = this.speed * TILE * dt;
    this.angle = Math.atan2(dy, dx);
    if (dist <= ms) { this.x=t.x; this.y=t.y; this.pathIndex++; }
    else { this.x += (dx/dist)*ms; this.y += (dy/dist)*ms; }
  }

  draw(ctx) {
    if (!this.alive) return;
    const img = enemyImages[this.type];
    const scale = this.et.scale;
    const size = TILE * 0.85 * scale;

    // Schatten
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(this.x, this.y + size*0.35, size*0.32, size*0.1, 0, 0, Math.PI*2);
    ctx.fill();

    if (img && img.complete && img.naturalWidth > 0) {
      ctx.save();
      ctx.translate(this.x, this.y);
      // Bild zeigt nach oben (-PI/2), daher +PI/2 Offset
      ctx.rotate(this.angle + Math.PI/2);
      ctx.drawImage(img, -size/2, -size/2, size, size);
      ctx.restore();
    } else {
      // Fallback-Dreieck
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.fillStyle = this.et.color;
      ctx.beginPath();
      ctx.moveTo(size*0.5,0); ctx.lineTo(-size*0.35,-size*0.3); ctx.lineTo(-size*0.35,size*0.3);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    // HP-Balken
    const barW = size*1.1, barH = 3+(this.type==='boss'?2:0);
    const barX = this.x-barW/2, barY = this.y-size/2-6;
    ctx.fillStyle='#200000'; ctx.fillRect(barX,barY,barW,barH);
    const r = Math.max(0, this.hp/this.maxHp);
    ctx.fillStyle = r>0.5?'#40c040':r>0.25?'#e0c020':'#e03030';
    ctx.fillRect(barX,barY,barW*r,barH);
    ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=0.5;
    ctx.strokeRect(barX,barY,barW,barH);

    // Slow-Ring
    if (this.slowTimer>0) {
      ctx.strokeStyle='rgba(80,180,255,0.45)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(this.x,this.y,size*0.5+3,0,Math.PI*2); ctx.stroke();
    }
  }
}

// ======================== KLASSE: TOWER ======================================
class Tower {
  constructor(col, row, def) {
    this.col=col; this.row=row;
    this.x=col*TILE+TILE/2; this.y=row*TILE+TILE/2;
    this.def=def; this.level=0; this.fireTimer=0; this.target=null; this.angle=0;
    this.kills=0; this.totalDamageDealt=0;
    this.damage=def.damage; this.range=def.range; this.fireRate=def.fireRate;
    this.projSpeed=def.projSpeed;
    this.slowFactor=def.slowFactor||1; this.slowDur=def.slowDur||0; this.aoE=def.aoE||0;
    this.poisonDmg=def.poisonDmg||0; this.poisonDur=def.poisonDur||0;
    this.burnDmg=def.burnDmg||0; this.burnDur=def.burnDur||0;
    this.pierceCount=def.pierceCount||0;
    this.totalInvested=def.cost;
    this.placeAnim=1.0;
  }

  upgrade() {
    if (this.level>=this.def.upgrades.length) return false;
    const u=this.def.upgrades[this.level];
    if (gold<u.cost) return false;
    gold-=u.cost; this.totalInvested+=u.cost; this.level++;
    if(u.damage)this.damage=u.damage; if(u.range)this.range=u.range;
    if(u.fireRate)this.fireRate=u.fireRate;
    if(u.slowFactor!==undefined)this.slowFactor=u.slowFactor;
    if(u.aoE)this.aoE=u.aoE;
    if(u.poisonDmg)this.poisonDmg=u.poisonDmg; if(u.poisonDur)this.poisonDur=u.poisonDur;
    if(u.burnDmg)this.burnDmg=u.burnDmg; if(u.burnDur)this.burnDur=u.burnDur;
    if(u.pierceCount)this.pierceCount=u.pierceCount;
    playSound('upgrade');
    // Upgrade-Partikel
    for(let i=0;i<10;i++) spawnParticle(this.x, this.y, '#f0c040', 4, 0.5);
    updateHUD(); return true;
  }
  getUpgradeCost() { return this.level<this.def.upgrades.length ? this.def.upgrades[this.level].cost : null; }
  getSellValue() { return Math.floor(this.totalInvested*0.6); }
  getUpgradePreview() { return this.level<this.def.upgrades.length ? this.def.upgrades[this.level] : null; }

  findTarget() {
    let best=null, bp=-1;
    const rPx=this.range*TILE;
    for(const e of enemies) {
      if(!e.alive) continue;
      const dx=e.x-this.x, dy=e.y-this.y;
      if(dx*dx+dy*dy<=rPx*rPx && e.pathIndex>bp) { bp=e.pathIndex; best=e; }
    }
    return best;
  }

  update(dt) {
    if(this.placeAnim>0) this.placeAnim-=dt*3;
    this.fireTimer-=dt;
    this.target=this.findTarget();
    if(this.target) {
      this.angle=Math.atan2(this.target.y-this.y, this.target.x-this.x);
      if(this.fireTimer<=0) { this.fire(); this.fireTimer=this.fireRate; }
    }
  }

  fire() {
    projectiles.push(new Projectile(this.x, this.y, this.target, this));
    playSound('shoot');
  }

  draw(ctx) {
    const img=towerImages[this.def.id];
    let size=TILE*1.15;
    let oY=0;
    if(this.placeAnim>0) {
      const t=this.placeAnim;
      size*=(1+t*0.2); oY=-t*8;
      ctx.globalAlpha=1-t*0.3;
    }
    // Schatten
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(this.x,this.y+TILE*0.4,TILE*0.35,TILE*0.12,0,0,Math.PI*2); ctx.fill();

    if(img&&img.complete) {
      ctx.drawImage(img, this.x-size/2, this.y-size/2-4+oY, size, size);
    } else {
      ctx.fillStyle=this.def.projColor;
      ctx.fillRect(this.col*TILE+4, this.row*TILE+4, TILE-8, TILE-8);
    }
    ctx.globalAlpha=1;
    if(this.level>0) {
      ctx.fillStyle='#f0c040'; ctx.font='10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('★'.repeat(this.level), this.x, this.y+TILE/2-2);
    }
    if(selectedTower===this) {
      ctx.strokeStyle='rgba(240,200,80,0.35)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.range*TILE,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(240,200,80,0.06)'; ctx.fill();
    }
  }
}

// ======================== KLASSE: PROJECTILE =================================
class Projectile {
  constructor(x,y,target,tower) {
    this.x=x; this.y=y; this.target=target; this.tower=tower;
    this.speed=tower.projSpeed*TILE; this.alive=true;
    this.hitEnemies=new Set(); this.color=tower.def.projColor;
    this.trail=[];
  }
  update(dt) {
    if(!this.alive) return;
    this.trail.push({x:this.x,y:this.y,life:0.2});
    if(this.trail.length>6) this.trail.shift();
    if(!this.target||!this.target.alive){this.alive=false;return;}
    const dx=this.target.x-this.x, dy=this.target.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy), move=this.speed*dt;
    if(dist<=move+10) this.hit(this.target);
    else { this.x+=(dx/dist)*move; this.y+=(dy/dist)*move; }
    for(const t of this.trail) t.life-=dt;
  }
  hit(enemy) {
    if(this.hitEnemies.has(enemy)) return;
    this.hitEnemies.add(enemy);
    const tw=this.tower;
    playSound('hit');
    if(tw.aoE>0) {
      const aoePx=tw.aoE*TILE;
      for(const e of enemies) {
        if(!e.alive) continue;
        const dx=e.x-this.x,dy=e.y-this.y;
        if(dx*dx+dy*dy<=aoePx*aoePx) {
          const prevAlive=e.hp>0;
          e.hp-=tw.damage; tw.totalDamageDealt+=tw.damage;
          if(e.hp<=0&&prevAlive) tw.kills++;
          if(tw.def.special==='slow'){e.slowTimer=tw.slowDur;e.slowFactor=tw.slowFactor;}
          if(tw.def.special==='fire'){e.burnTimer=tw.burnDur;e.burnDmg=tw.burnDmg;}
        }
      }
      spawnAoECircle(this.x,this.y,aoePx,tw.def.projColor);
    } else {
      const prevAlive=enemy.hp>0;
      enemy.hp-=tw.damage; tw.totalDamageDealt+=tw.damage;
      if(enemy.hp<=0&&prevAlive) tw.kills++;
    }
    if(tw.def.special==='poison'){enemy.poisonTimer=tw.poisonDur;enemy.poisonDmg=tw.poisonDmg;}
    if(tw.def.special==='slow'&&tw.aoE===0){enemy.slowTimer=tw.slowDur;enemy.slowFactor=tw.slowFactor;}
    if(tw.def.special==='pierce'&&this.hitEnemies.size<tw.pierceCount) {
      const rPx=tw.range*TILE; let next=null,bd=Infinity;
      for(const e of enemies) {
        if(!e.alive||this.hitEnemies.has(e)) continue;
        const dx=e.x-this.x,dy=e.y-this.y,d=dx*dx+dy*dy;
        if(d<bd&&d<rPx*rPx){bd=d;next=e;}
      }
      if(next){this.target=next;return;}
    }
    this.alive=false;
  }
  draw(ctx) {
    if(!this.alive) return;
    for(const t of this.trail) {
      if(t.life>0){ctx.globalAlpha=t.life*3;ctx.fillStyle=this.color;
        ctx.beginPath();ctx.arc(t.x,t.y,2,0,Math.PI*2);ctx.fill();}
    }
    ctx.globalAlpha=1;
    ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(this.x,this.y,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

// ======================== PARTIKEL ===========================================
function spawnParticle(x,y,color,size,life) {
  particles.push({x,y,vx:(Math.random()-0.5)*60,vy:(Math.random()-0.5)*60-20,color,size,life,maxLife:life});
}
function spawnAoECircle(x,y,radius,color) {
  particles.push({x,y,vx:0,vy:0,color,size:radius,life:0.3,maxLife:0.3,isAoE:true});
}
function spawnFloatingText(x,y,text,color) {
  floatingTexts.push({x,y,text,color,life:1.0});
}
function updateParticles(dt) {
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt;
  }
  for(let i=floatingTexts.length-1;i>=0;i--) {
    const f=floatingTexts[i]; f.life-=dt; f.y-=30*dt;
    if(f.life<=0) floatingTexts.splice(i,1);
  }
}
function drawParticles(ctx) {
  for(const p of particles) {
    const a=p.life/p.maxLife;
    if(p.isAoE) {
      ctx.strokeStyle=p.color; ctx.globalAlpha=a*0.5; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(1-a*0.5),0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=a*0.1; ctx.fillStyle=p.color; ctx.fill();
    } else {
      ctx.globalAlpha=a; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  for(const f of floatingTexts) {
    ctx.globalAlpha=Math.min(1,f.life*2); ctx.fillStyle=f.color;
    ctx.font='bold 13px Almendra, serif'; ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

// ======================== PFAD-ANIMATION =====================================
let pathAnimOffset = 0;
function drawPathArrows(ctx) {
  pathAnimOffset += 0.02 * gameSpeed;
  if (pathAnimOffset>1) pathAnimOffset-=1;
  for(let i=0;i<PATH_PX.length-1;i++) {
    if(i%3!==0) continue;
    const p=PATH_PX[i], pN=PATH_PX[i+1];
    const ang=Math.atan2(pN.y-p.y, pN.x-p.x);
    const pulse=0.6+0.4*Math.sin(((i/PATH_PX.length)+pathAnimOffset)*Math.PI*2);
    ctx.globalAlpha=0.12*pulse; ctx.fillStyle='#a09060';
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(ang);
    ctx.beginPath(); ctx.moveTo(6,0); ctx.lineTo(-4,-4); ctx.lineTo(-4,4); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

// ======================== SPIELFELD ZEICHNEN =================================
function drawGrid(ctx) {
  ctx.fillStyle='#1a2a10'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) {
    ctx.fillStyle=((c+r)%2===0)?'#1e2e12':'#1a2a10';
    ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
  }
  ctx.fillStyle='#3a3020';
  for(const[c,r]of PATH_TILES) ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
  ctx.strokeStyle='#2a2018'; ctx.lineWidth=1;
  for(const[c,r]of PATH_TILES) ctx.strokeRect(c*TILE+0.5,r*TILE+0.5,TILE-1,TILE-1);
  drawPathArrows(ctx);
  const s=PATH_TILES[0], e=PATH_TILES[PATH_TILES.length-1];
  ctx.fillStyle='rgba(80,200,80,0.25)'; ctx.fillRect(s[0]*TILE,s[1]*TILE,TILE,TILE);
  ctx.fillStyle='rgba(200,40,40,0.25)'; ctx.fillRect(e[0]*TILE,e[1]*TILE,TILE,TILE);
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*TILE,0);ctx.lineTo(c*TILE,canvas.height);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*TILE);ctx.lineTo(canvas.width,r*TILE);ctx.stroke();}
  // Hover
  if(hoverTile&&selectedTowerDef) {
    const[hc,hr]=hoverTile;
    const can=canPlaceTower(hc,hr);
    ctx.fillStyle=can?'rgba(80,200,80,0.2)':'rgba(200,40,40,0.2)';
    ctx.fillRect(hc*TILE,hr*TILE,TILE,TILE);
    ctx.strokeStyle=can?'rgba(80,200,80,0.5)':'rgba(200,40,40,0.5)';
    ctx.lineWidth=2; ctx.strokeRect(hc*TILE+1,hr*TILE+1,TILE-2,TILE-2);
    if(can) {
      ctx.strokeStyle='rgba(240,200,80,0.25)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.arc(hc*TILE+TILE/2,hr*TILE+TILE/2,selectedTowerDef.range*TILE,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

// ======================== SPIELLOGIK =========================================
function canPlaceTower(c,r) {
  if(c<0||c>=COLS||r<0||r>=ROWS) return false;
  if(PATH_SET.has(`${c},${r}`)) return false;
  return !towers.some(t=>t.col===c&&t.row===r);
}

function placeTower(col,row,def) {
  if(!canPlaceTower(col,row)||gold<def.cost) return false;
  gold-=def.cost;
  towers.push(new Tower(col,row,def));
  playSound('place');
  // Auswahl aufheben nach Platzierung
  selectedTowerDef=null;
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
  updateHUD(); return true;
}

function sellTower(tower) {
  const v=tower.getSellValue(); gold+=v;
  const idx=towers.indexOf(tower); if(idx>=0) towers.splice(idx,1);
  spawnFloatingText(tower.x,tower.y-10,`+${v}`,'#f0c040');
  playSound('sell');
  selectedTower=null; updateSelectionUI(); updateHUD();
}

function startWave() {
  if(waveActive||gameOver||waveNum>=TOTAL_WAVES) return;
  ensureAudio(); waveNum++; waveActive=true;
  const w=WAVES[waveNum-1]; currentWaveEnemies=[];
  for(let i=0;i<w.count;i++) {
    const td=w.types[Math.floor(Math.random()*w.types.length)];
    currentWaveEnemies.push(td);
  }
  spawnIndex=0; spawnTimer=0; playSound('wave');
  updateHUD(); document.getElementById('btn-wave').classList.add('disabled');
}

function spawnNextEnemy(dt) {
  if(!waveActive||spawnIndex>=currentWaveEnemies.length) return;
  spawnTimer-=dt;
  if(spawnTimer<=0) {
    const d=currentWaveEnemies[spawnIndex];
    enemies.push(new Enemy(d.hp,d.speed,d.reward,d.type));
    spawnIndex++; spawnTimer=WAVES[waveNum-1].delay;
  }
}

function checkWaveComplete() {
  if(!waveActive) return;
  if(spawnIndex>=currentWaveEnemies.length && enemies.every(e=>!e.alive)) {
    waveActive=false;
    const bonus=10+waveNum*5; gold+=bonus;
    spawnFloatingText(canvas.width/2,canvas.height/2-40,`Welle ${waveNum} geschafft! +${bonus} Gold`,'#80c0ff');
    playSound('waveclear'); updateHUD();
    document.getElementById('btn-wave').classList.remove('disabled');
    if(waveNum>=TOTAL_WAVES) {
      gameWon=true; gameOver=true;
      showOverlay('Sieg!',`Alle ${TOTAL_WAVES} Wellen überlebt!\nPunkte: ${score}`);
    }
  }
}

function checkLives() {
  for(let i=enemies.length-1;i>=0;i--) {
    const e=enemies[i];
    if(!e.alive&&e.reachedEnd) {
      lives--; enemies.splice(i,1);
      playSound('leak'); updateHUD();
      if(lives<=0) { gameOver=true; showOverlay('Niederlage!',`Welle ${waveNum} war zu viel.\nPunkte: ${score}`); }
    } else if(!e.alive) { enemies.splice(i,1); }
  }
}

// ======================== GAME LOOP ==========================================
let lastTime = 0;
function gameLoop(timestamp) {
  if(!lastTime) lastTime=timestamp;
  let dt=Math.min((timestamp-lastTime)/1000, 0.05);
  lastTime=timestamp;
  dt*=gameSpeed;

  if(!gameOver) {
    spawnNextEnemy(dt);
    for(const t of towers) t.update(dt);
    for(const e of enemies) e.update(dt);
    for(let i=projectiles.length-1;i>=0;i--) {
      projectiles[i].update(dt); if(!projectiles[i].alive) projectiles.splice(i,1);
    }
    updateParticles(dt); checkLives(); checkWaveComplete();
  }

  // Screen-Shake
  let sx=0,sy=0;
  if(shakeAmount>0.5) {
    sx=(Math.random()-0.5)*shakeAmount*2;
    sy=(Math.random()-0.5)*shakeAmount*2;
    shakeAmount*=shakeDecay;
    if(shakeAmount<0.5) shakeAmount=0;
  }

  ctx.save(); ctx.translate(sx,sy);
  drawGrid(ctx);
  for(const t of towers) t.draw(ctx);
  for(const e of enemies) e.draw(ctx);
  for(const p of projectiles) p.draw(ctx);
  drawParticles(ctx);
  ctx.restore();

  requestAnimationFrame(gameLoop);
}

// ======================== UI =================================================
function updateHUD() {
  document.getElementById('gold-val').textContent=gold;
  document.getElementById('lives-val').textContent=lives;
  document.getElementById('wave-val').textContent=`${waveNum} / ${TOTAL_WAVES}`;
  document.getElementById('score-val').textContent=score;
  document.querySelectorAll('.tower-btn').forEach(btn => {
    const def=TOWER_DEFS.find(d=>d.id===btn.dataset.towerId);
    if(def) btn.classList.toggle('cant-afford', gold<def.cost);
  });
  updateSelectionUI(); updateWavePreview();
}

function updateSelectionUI() {
  const bU=document.getElementById('btn-upgrade'), bS=document.getElementById('btn-sell');
  const info=document.getElementById('tower-info');
  if(selectedTower) {
    const t=selectedTower;
    bS.style.display='block'; bS.textContent=`💰 Verkaufen (+${t.getSellValue()} Gold)`;
    const uc=t.getUpgradeCost();
    if(uc!==null) {
      bU.style.display='block'; bU.textContent=`⬆ Upgrade (${uc} Gold)`;
      bU.style.opacity=gold>=uc?'1':'0.4';
    } else { bU.style.display='block'; bU.textContent='⬆ Max Level!'; bU.style.opacity='0.4'; }
    // Info
    info.style.display='block';
    let h=`<div class="ti-title">${t.def.name} (Stufe ${t.level+1})</div>`;
    h+=`<div class="ti-stat">Schaden: <span>${t.damage}</span></div>`;
    h+=`<div class="ti-stat">Reichweite: <span>${t.range.toFixed(1)}</span></div>`;
    h+=`<div class="ti-stat">Feuerrate: <span>${t.fireRate.toFixed(1)}s</span></div>`;
    h+=`<div class="ti-stat">Kills: <span style="color:#f08040;">${t.kills}</span></div>`;
    h+=`<div class="ti-stat">Ges. Schaden: <span style="color:#e06060;">${Math.floor(t.totalDamageDealt)}</span></div>`;
    const prev=t.getUpgradePreview();
    if(prev) {
      h+=`<div class="ti-upgrade">Nächstes Upgrade:`;
      if(prev.damage)h+=` Dmg→<span>${prev.damage}</span>`;
      if(prev.range)h+=` Rw→<span>${prev.range}</span>`;
      if(prev.fireRate)h+=` Rate→<span>${prev.fireRate}s</span>`;
      if(prev.aoE)h+=` AoE→<span>${prev.aoE}</span>`;
      if(prev.poisonDmg)h+=` Gift→<span>${prev.poisonDmg}/s</span>`;
      if(prev.burnDmg)h+=` Feuer→<span>${prev.burnDmg}/s</span>`;
      if(prev.pierceCount)h+=` Pierce→<span>${prev.pierceCount}</span>`;
      h+=`</div>`;
    }
    info.innerHTML=h;
  } else { bU.style.display='none'; bS.style.display='none'; info.style.display='none'; }
}

function updateWavePreview() {
  const wp=document.getElementById('wave-preview');
  if(waveActive||gameOver||waveNum>=TOTAL_WAVES){wp.style.display='none';return;}
  const nw=WAVES[waveNum];
  if(!nw){wp.style.display='none';return;}
  wp.style.display='block';
  let h=`<div class="wp-title">📋 Welle ${waveNum+1}</div>`;
  h+=`<div class="wp-line">Gegner: <span>${nw.count}</span></div>`;
  const tl=nw.types.map(t=>{const et=ENEMY_TYPES[t.type];return`<span style="color:${et.color}">${et.label}</span>`;});
  h+=`<div class="wp-line">Typen: ${tl.join(', ')}</div>`;
  const avgHp=Math.floor(nw.types.reduce((s,t)=>s+t.hp,0)/nw.types.length);
  h+=`<div class="wp-line">~HP: <span>${avgHp}</span></div>`;
  wp.innerHTML=h;
}

function buildSidebar() {
  const panel=document.getElementById('tower-panel');
  TOWER_DEFS.forEach((def,i)=>{
    const btn=document.createElement('div');
    btn.className='tower-btn'; btn.dataset.towerId=def.id;
    btn.innerHTML=`
      <img id="sidebar-img-${def.id}" src="" alt="${def.name}">
      <div class="tb-info">
        <span class="tb-name">${def.name}</span>
        <span class="tb-cost">${def.cost} Gold</span>
        <span class="tb-desc">${def.desc}</span>
      </div>
      <span class="tb-hotkey">${i+1}</span>
    `;
    btn.addEventListener('click',()=>{
      ensureAudio();
      if(selectedTowerDef===def){selectedTowerDef=null;btn.classList.remove('selected');}
      else{
        selectedTowerDef=def;selectedTower=null;updateSelectionUI();
        document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
      }
    });
    panel.appendChild(btn);
  });
}

function updateSidebarImage(id) {
  const el=document.getElementById(`sidebar-img-${id}`);
  if(el&&towerImages[id]) el.src=towerImages[id].src;
}

function showOverlay(title,text) {
  document.getElementById('overlay-title').textContent=title;
  document.getElementById('overlay-text').textContent=text;
  document.getElementById('overlay').classList.add('show');
}

function resetGame() {
  gold=200;lives=20;score=0;waveNum=0;
  waveActive=false;gameOver=false;gameWon=false;
  towers=[];enemies=[];projectiles=[];particles=[];floatingTexts=[];
  currentWaveEnemies=[];spawnIndex=0;spawnTimer=0;
  selectedTower=null;selectedTowerDef=null;
  WAVES=generateWaves(TOTAL_WAVES);
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('btn-wave').classList.remove('disabled');
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
  updateHUD();updateSelectionUI();
}

// ======================== EINGABEN ===========================================
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  hoverTile=[Math.floor((e.clientX-r.left)/TILE),Math.floor((e.clientY-r.top)/TILE)];
});
canvas.addEventListener('mouseleave',()=>{hoverTile=null;});

canvas.addEventListener('click',e=>{
  if(gameOver) return;
  ensureAudio();
  const r=canvas.getBoundingClientRect();
  const col=Math.floor((e.clientX-r.left)/TILE), row=Math.floor((e.clientY-r.top)/TILE);
  if(selectedTowerDef) { if(placeTower(col,row,selectedTowerDef)) return; }
  const clicked=towers.find(t=>t.col===col&&t.row===row);
  if(clicked){
    selectedTower=clicked;selectedTowerDef=null;
    document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
    updateSelectionUI();
  } else { selectedTower=null;updateSelectionUI(); }
});

canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  selectedTowerDef=null;selectedTower=null;
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
  updateSelectionUI();
});

document.getElementById('btn-wave').addEventListener('click',()=>{ensureAudio();startWave();});
document.getElementById('btn-upgrade').addEventListener('click',()=>{
  if(selectedTower){selectedTower.upgrade();updateSelectionUI();}
});
document.getElementById('btn-sell').addEventListener('click',()=>{
  if(selectedTower) sellTower(selectedTower);
});

document.querySelectorAll('.speed-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    gameSpeed=parseInt(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    selectedTowerDef=null;selectedTower=null;
    document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
    updateSelectionUI();
  }
  if(e.key===' '||e.key==='Enter'){e.preventDefault();ensureAudio();startWave();}
  const num=parseInt(e.key);
  if(num>=1&&num<=6){
    ensureAudio();
    const def=TOWER_DEFS[num-1];
    if(selectedTowerDef===def){
      selectedTowerDef=null;
      document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
    } else {
      selectedTowerDef=def;selectedTower=null;updateSelectionUI();
      document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
      document.querySelector(`[data-tower-id="${def.id}"]`)?.classList.add('selected');
    }
  }
});

// ======================== START ==============================================
buildSidebar(); updateHUD();
loadImages(()=>{
  console.log('Alle Bilder geladen.');
  requestAnimationFrame(gameLoop);
});
setTimeout(()=>{if(!lastTime) requestAnimationFrame(gameLoop);}, 800);
</script>
